version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    environment:
      SA_PASSWORD: "SampleApp_Passw0rd!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'SampleApp_Passw0rd!' -Q 'SELECT 1' 2>/dev/null || /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SampleApp_Passw0rd!' -No -Q 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_CONNECTION_STRING=Data Source=db,1433;Initial Catalog=SampleWebAppDb;User Id=sa;Password=SampleApp_Passw0rd!;MultipleActiveResultSets=True
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
